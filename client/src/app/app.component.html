<header class="topbar">
  <div class="brand">Lega Pauper · Massarosa</div>
  <nav>
    <a routerLink="/classifica" routerLinkActive="active">Classifica</a>
    <a routerLink="/tappe" routerLinkActive="active">Tappe</a>
    @if (isAdmin()) {
      <a routerLink="/inserimento" routerLinkActive="active">Inserimento</a>
      <a routerLink="/impostazioni" routerLinkActive="active">Impostazioni</a>
    }
  </nav>
  <div class="spacer"></div>
  @if (isAdmin()) {
    <button type="button" class="link-btn" (click)="logout()">Logout</button>
  } @else {
    <a routerLink="/login" routerLinkActive="active">Login</a>
  }
</header>

<main class="content">
  <router-outlet />
</main>
