services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: classifica_lega
      POSTGRES_USER: classifica_lega
      POSTGRES_PASSWORD: classifica_lega_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
